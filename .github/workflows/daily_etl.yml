name: Daily Macro ETL
on:
  schedule:
    - cron: '0 22 * * 1-5' # 10 PM UTC weekdays
  workflow_dispatch: # Allows you to manually click a "Run" button on GitHub

jobs:
  run_etl:
    runs-on: ubuntu-latest
    env:
      NODE_VERSION: '20'              # <-- ADD THIS LINE
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Python Environment (uv)
        uses: astral-sh/setup-uv@v4

      - name: Sync Dependencies
        run: uv sync
      
      - name: Run Unit Tests (Offline Validation)
        run: uv run pytest

      - name: Run Pipeline (Dynamic 3-Day Lookback)
        run: uv run python main.py --start $(date -d "3 days ago" +%Y-%m-%d) 

      - name: Commit Data Lake Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(data): automated daily ETL upsert"
          # 'fail_on_no_changes' is not a valid input for this action; remove it to avoid workflow error