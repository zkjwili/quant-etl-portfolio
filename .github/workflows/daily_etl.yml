name: Daily Macro ETL
on:
  schedule:
    - cron: '0 22 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run_etl:
    runs-on: ubuntu-latest
    env:
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync

      - name: Run ETL Pipeline
        run: uv run python main.py --start $(date -d "3 days ago" +%Y-%m-%d) 

      - name: Commit Data Lake Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain data_lake/)" ]; then
            git add data_lake/
            git commit -m "chore(data): automated daily ETL upsert"
            # THE FIX: Pull any website edits before pushing to prevent collisions
            git pull --rebase origin main
            git push
          else
            echo "No new data to commit."
          fi
