name: Daily Macro ETL
on:
  schedule:
    - cron: '0 22 * * 1-5' # 10 PM UTC weekdays
  workflow_dispatch:

jobs:
  run_etl:
    runs-on: ubuntu-latest
    env:
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync

      # Dynamic Bash Injection for 3-day lookback
      - name: Run ETL Pipeline
        run: uv run python main.py --start $(date -d "3 days ago" +%Y-%m-%d) 

      # THE CLEAN FIX: No file_pattern, no bash scripts.
      # It safely adds whatever exists, and ignores if nothing exists.
      - name: Commit Data Lake Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(data): automated daily ETL upsert"
          fail_on_no_changes: false